services:
  - type: web
    name: ridera-admin-dashboard
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false   # Set this manually in Render Dashboard (secret)
      - key: RIDERA_ADMIN_EMAIL
        sync: false   # Set this manually in Render Dashboard (secret)
      - key: RIDERA_ADMIN_PASSWORD
        sync: false   # Set this manually in Render Dashboard (secret)
      - key: RIDERA_SESSION_TOKEN
        sync: false   # Set this manually in Render Dashboard (secret)
